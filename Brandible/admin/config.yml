backend:
  name: git-gateway
  branch: main # Branch to update (optional, defaults to master)
  # Single commit per published post when using editorial workflow (GitHub + Git Gateway)
  squash_merges: true

# Save draft = commit to a PR branch; Publish = merge to main (requires GitHub-backed Git Gateway)
publish_mode: editorial_workflow

# Media storage - configure if you want to upload images
media_folder: "Brandible/assets/blog-images" # Media files will be stored here
public_folder: "/assets/blog-images" # Public path to media files

# Site URL for previews and links
site_url: https://www.brandiblemg.com
display_url: https://www.brandiblemg.com
logo_url: https://www.brandiblemg.com/assets/Brandible.png

# Collections - easy to add more later
collections:
  # Blog Posts Collection
  - name: "blog" # Collection name (used in API)
    label: "Blog Posts" # Display name in CMS UI
    folder: "Brandible/blogs/posts" # Where files are stored
    create: true # Allow creating new files
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename pattern
    summary: "{{title}} — {{date}}"
    sortable_fields:
      - title
      - date
      - category
      - draft
    # Tabs for posts already on main: visible vs hidden (optional “unpublish” flag)
    view_groups:
      - label: Visible on site
        field: draft
        pattern: "false"
      - label: Hidden on site
        field: draft
        pattern: "true"
    fields:
      - label: "Hide from live site"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Leave off for normal posts. Use the toolbar Save / Publish for workflow. Turn on only if the post is on main but should stay off the public site."
      - {label: "Title", name: "title", widget: "string", required: true}
      - label: "URL slug"
        name: "slug"
        widget: "string"
        required: false
        hint: "Short segment for the post URL (lowercase, hyphens). Leave blank to generate from the title."
      - {label: "Publish Date", name: "date", widget: "datetime", required: true}
      - {label: "Author", name: "author", widget: "string", required: true, default: "Brandible Team"}
      - {label: "SEO title", name: "meta_title", widget: "string", required: false, hint: "Optional. Overrides <title> and Open Graph title (brand suffix added on the site)."}
      - {label: "SEO description", name: "meta_description", widget: "text", required: false, hint: "Optional. Overrides meta description and social descriptions if set."}
      - {label: "Social share image", name: "og_image", widget: "image", required: false, hint: "Optional. Overrides featured image for Open Graph / Twitter cards."}
      - {label: "Featured Image", name: "featured_image", widget: "image", required: false}
      - {label: "Featured image alt text", name: "featured_image_alt", widget: "string", required: false, hint: "Describe the image for accessibility and SEO."}
      - {label: "Excerpt", name: "excerpt", widget: "text", required: false, hint: "Short description for blog listing"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["Marketing", "Web Design", "SEO", "Social Media", "Business Tips", "Case Studies"], required: false}
      - {label: "Body", name: "body", widget: "markdown", required: true}

  # Future collections can be added here easily:
