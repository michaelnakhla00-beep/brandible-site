<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Brandible Marketing Group</title>
</head>
<body>
  <script>
    (function () {
      if (location.hostname === "brandiblemg.com") {
        location.replace(
          "https://www.brandiblemg.com" +
            location.pathname +
            location.search +
            location.hash
        );
        return;
      }
      // One-time clear when switching from Git Gateway / Identity so old CMS state does not break login.
      try {
        var m = "brandible-cms-github-backend-v1";
        if (!localStorage.getItem(m)) {
          Object.keys(localStorage).forEach(function (k) {
            if (k.indexOf("decap-cms") === 0 || k.indexOf("netlify-cms") === 0) {
              localStorage.removeItem(k);
            }
          });
          localStorage.setItem(m, "1");
        }
      } catch (e) {}
      var s = document.createElement("script");
      s.src = "https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js";
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
