<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Brandible Marketing Group</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    [data-netlify-identity-menu] {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 99999;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Login / account — must be logged in for Git Gateway saves -->
  <div data-netlify-identity-menu></div>
  <script>
    (function () {
      if (location.hostname === "brandiblemg.com") {
        location.replace(
          "https://www.brandiblemg.com" +
            location.pathname +
            location.search +
            location.hash
        );
        return;
      }

      var decapInjected = false;
      function loadDecapCMSOnce() {
        if (decapInjected) return;
        decapInjected = true;
        var s = document.createElement("script");
        s.src = "https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js";
        document.body.appendChild(s);
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("login", function () {
          window.location.reload();
        });
        window.netlifyIdentity.on("logout", function () {
          window.location.reload();
        });
        // init can fire more than once (session recovery, etc.); only ever load Decap once
        window.netlifyIdentity.on("init", function () {
          loadDecapCMSOnce();
        });
        window.netlifyIdentity.init();
      } else {
        loadDecapCMSOnce();
      }
    })();
  </script>
</body>
</html>
